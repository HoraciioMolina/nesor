<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="Nesor — Prisma to TypeScript domain entities">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>

  <g opacity="0.07" stroke="#94A3B8" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/>
  </g>

  <g text-anchor="middle">
    <text x="640" y="155"
          font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
          font-size="104" font-weight="700" letter-spacing="-3"
          fill="#F8FAFC">
      <tspan fill="#64748B">{</tspan> nesor <tspan fill="#64748B">}</tspan>
    </text>

    <text x="640" y="210"
          font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif"
          font-size="26" font-weight="500" fill="#CBD5E1">
      Prisma <tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="url(#brand)">&#8594;</tspan> clean, modular TypeScript domain entities
    </text>

    <text x="640" y="262"
          font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif"
          font-size="13" font-weight="600" fill="#64748B" letter-spacing="4">
      ONE FILE PER MODEL  ·  VARIANTS  ·  BRANDED IDS  ·  ENTITYMETA
    </text>
  </g>
</svg>
